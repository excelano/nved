# goreleaser configuration. Triggered by .github/workflows/release.yml on
# every "v*" tag push. To test locally (optional):
#   goreleaser release --snapshot --clean
# Snapshots produce binaries in ./dist/ without touching GitHub.
#
# Cross-platform: linux, darwin, and windows. apt only consumes the linux
# .debs; the darwin tarballs and the windows zip are a convenience for
# source-free installs. Terminal input is portable Go (a reader goroutine, not
# unix.Poll), and console_windows.go switches the Windows console into ANSI
# mode at startup.

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: nved
    main: .
    binary: nved
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: nved
    name_template: "nved_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - LICENSE
      - README.md

nfpms:
  - id: nved
    package_name: nved
    file_name_template: "{{ .ConventionalFileName }}"
    maintainer: David M. Anderson <david.anderson@excelano.com>
    description: |
      A terminal text editor that feels like a REPL, not a full-screen app.
      Print a range of lines by number, climb into the printed block with the
      arrow keys, and edit it in place. No alternate screen: output scrolls
      normally and scrollback stays intact. A from-scratch descendant of ved.
    homepage: https://github.com/excelano/nved
    license: MIT
    formats:
      - deb
    section: editors
    priority: optional
    bindir: /usr/bin
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/nved/copyright
      - src: ./README.md
        dst: /usr/share/doc/nved/README.md

checksum:
  name_template: "checksums.txt"

release:
  draft: false
  prerelease: auto

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"

brews:
  - name: nved
    repository:
      owner: excelano
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://excelano.com/nved/"
    description: "Terminal text editor that edits in your scrollback like a REPL"
    license: "MIT"
    install: |
      bin.install "nved"
    test: |
      system "#{bin}/nved", "--version"
